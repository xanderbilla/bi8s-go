# Compose setup for running the API in a container while using live AWS DynamoDB.
services:
  api:
    container_name: bi8s-go-api
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: docker.io/xanderbilla/my-project:local
    ports:
      - "8080:8080"
    environment:
      # App configuration values. Override from shell or an .env file.
      ENV: ${ENV:-dev}
      DYNAMODB_TABLE: ${DYNAMODB_TABLE:-bi8s-dev}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_POSTER_PREFIX: ${S3_POSTER_PREFIX:-movies}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:8443,http://13.217.109.221:8443}
      CORS_ALLOW_PRIVATE_NETWORK: ${CORS_ALLOW_PRIVATE_NETWORK:-true}
    restart: unless-stopped
