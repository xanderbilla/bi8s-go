version: "3.8"

services:
  # Backend API Service
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: bi8s_api_local
    ports:
      - "8080:8080"
    environment:
      ENV: dev
      DYNAMODB_TABLE: ${DYNAMODB_TABLE:-bi8s-dev}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      S3_BUCKET: ${S3_BUCKET:-bi8s}
      S3_POSTER_PREFIX: ${S3_POSTER_PREFIX:-movies}
      CORS_ALLOWED_ORIGINS: "http://localhost:3000,http://localhost:8443,http://127.0.0.1:8443"
      CORS_ALLOW_PRIVATE_NETWORK: "true"
    restart: unless-stopped

  # Frontend UI Application
  ui:
    build:
      context: /Users/xanderbilla/Desktop/examples-go/enternflix
      dockerfile: Dockerfile
      args:
        ENV_FILE: .env.local
    container_name: bi8s_ui_local
    ports:
      - "8443:8443"
    environment:
      NODE_ENV: development
    depends_on:
      - api
    restart: unless-stopped
