# OpenTelemetry Collector configuration.
# The Go application emits OTLP/gRPC over port 4317. This collector fans the
# data out: traces -> Tempo, metrics -> Prometheus (scraped), logs -> Loki.
# Telemetry from the Go app must reach Prometheus / Tempo / Loki ONLY through
# this collector — never directly.

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  memory_limiter:
    check_interval: 1s
    limit_percentage: 80
    spike_limit_percentage: 20
  batch:
    timeout: 5s
    send_batch_size: 1024
  resource:
    attributes:
      - key: collector
        value: bi8s-otelcol
        action: upsert

exporters:
  # Traces -> Tempo (OTLP gRPC).
  otlp/tempo:
    endpoint: tempo:4317
    tls:
      insecure: true

  # Metrics -> Prometheus exposition (scraped by Prometheus on :8889/metrics).
  prometheus:
    endpoint: 0.0.0.0:8889
    namespace: bi8s
    send_timestamps: true
    metric_expiration: 5m
    resource_to_telemetry_conversion:
      enabled: true

  # Logs -> Loki via its native OTLP HTTP endpoint.
  otlphttp/loki:
    endpoint: http://loki:3100/otlp
    tls:
      insecure: true

  debug:
    verbosity: basic

extensions:
  health_check:
    endpoint: 0.0.0.0:13133

service:
  extensions: [ health_check ]
  pipelines:
    traces:
      receivers: [ otlp ]
      processors: [ memory_limiter, resource, batch ]
      exporters: [ otlp/tempo ]
    metrics:
      receivers: [ otlp ]
      processors: [ memory_limiter, resource, batch ]
      exporters: [ prometheus ]
    logs:
      receivers: [ otlp ]
      processors: [ memory_limiter, resource, batch ]
      exporters: [ otlphttp/loki ]
  telemetry:
    logs:
      level: info
