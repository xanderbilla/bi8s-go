apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    uid: prometheus
    isDefault: true
    jsonData:
      timeInterval: 15s
      exemplarTraceIdDestinations:
        - name: trace_id
          datasourceUid: tempo

  - name: Tempo
    type: tempo
    access: proxy
    url: http://tempo:3200
    uid: tempo
    jsonData:
      httpMethod: GET
      tracesToLogsV2:
        datasourceUid: loki
        spanStartTimeShift: -1h
        spanEndTimeShift: 1h
        filterByTraceID: true
        tags:
          - key: service.name
            value: service
      tracesToMetrics:
        datasourceUid: prometheus
        spanStartTimeShift: -1h
        spanEndTimeShift: 1h
      serviceMap:
        datasourceUid: prometheus
      nodeGraph:
        enabled: true
      search:
        hide: false
      lokiSearch:
        datasourceUid: loki

  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    uid: loki
    jsonData:
      derivedFields:
        - name: trace_id
          matcherRegex: "trace_id=(\\w+)"
          url: "$${__value.raw}"
          datasourceUid: tempo
        - name: TraceID
          matcherType: label
          matcherRegex: trace_id
          url: "$${__value.raw}"
          datasourceUid: tempo

  # AWS CloudWatch — for DynamoDB / EC2 / S3 / Lambda metrics. Uses AWS SDK default
  # credentials chain (env, ~/.aws/credentials, IRSA, instance profile). In local dev
  # mount ~/.aws into the grafana container or set AWS_* env vars on the service.
  - name: CloudWatch
    type: cloudwatch
    access: proxy
    uid: cloudwatch
    editable: true
    jsonData:
      authType: default
      defaultRegion: ${AWS_REGION:-us-east-1}
      customMetricsNamespaces: "AWS/DynamoDB,AWS/EC2,AWS/S3,AWS/Lambda,AWS/ApplicationELB"
