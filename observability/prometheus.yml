global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: bi8s-local
    replica: 0

scrape_configs:
  - job_name: otel-collector
    static_configs:
      - targets: [ "otel-collector:8889" ]
        labels:
          source: otel-collector

  - job_name: prometheus
    static_configs:
      - targets: [ "localhost:9090" ]

  - job_name: cadvisor
    static_configs:
      - targets: [ "cadvisor:8080" ]
        labels:
          source: cadvisor

  - job_name: node-exporter
    static_configs:
      - targets: [ "node-exporter:9100" ]
        labels:
          source: node-exporter
