# Production stack on EC2.
#
# Layout (managed by infra/tofu user-data on first boot):
#   /opt/${PROJECT_NAME}/compose/docker-compose.yml   -> repo/infra/docker/docker-compose.yml (symlink)
#   /opt/${PROJECT_NAME}/compose/observability/       -> repo/observability/                  (symlink)
#   /opt/${PROJECT_NAME}/compose/.env                 (rendered by user-data: image tag, AWS, table names)
#   /opt/${PROJECT_NAME}/nginx/conf.d|ssl|certbot/www (rendered by user-data, dynamic public IP)
#   /opt/${PROJECT_NAME}/prometheus-data              (EBS volume mount)
#
# Telemetry flow: app  -OTLP/gRPC-> otel-collector -> {tempo,loki,prometheus(via /metrics scrape)}
# AWS access: Loki/Tempo S3 use the EC2 instance profile (no creds in env).

name: bi8s

x-restart-policy: &restart-policy
  restart: unless-stopped

x-logging: &default-logging
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "5"

services:
  quality:
    build:
      context: ../../app
      dockerfile: Dockerfile
      target: quality
    container_name: ${PROJECT_NAME:-bi8s}-quality
    command: [ "/bin/sh", "-c", "echo quality checks passed" ]
    profiles: [ "quality" ]
    networks: [ app-network ]

  api:
    <<: [ *restart-policy, *default-logging ]
    image: ${IMAGE_NAME:-929910138721.dkr.ecr.us-east-1.amazonaws.com/bi8s-dev:latest}
    container_name: ${PROJECT_NAME:-bi8s}-api
    pull_policy: always
    expose:
      - "8080"
    environment:
      APP_ENV: ${APP_ENV}
      PORT: ":8080"
      LOG_LEVEL: ${LOG_LEVEL:-info}
      AWS_REGION: ${AWS_REGION}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      DYNAMODB_MOVIE_TABLE: ${DYNAMODB_MOVIE_TABLE}
      DYNAMODB_PERSON_TABLE: ${DYNAMODB_PERSON_TABLE}
      DYNAMODB_ATTRIBUTE_TABLE: ${DYNAMODB_ATTRIBUTE_TABLE}
      DYNAMODB_ATTRIBUTE_NAME_INDEX: ${DYNAMODB_ATTRIBUTE_NAME_INDEX:-name-index}
      DYNAMODB_ENCODER_TABLE: ${DYNAMODB_ENCODER_TABLE}
      DYNAMODB_ENCODER_CONTENT_ID_INDEX: ${DYNAMODB_ENCODER_CONTENT_ID_INDEX:-contentId-index}
      DYNAMODB_MAX_SCAN_PAGES: ${DYNAMODB_MAX_SCAN_PAGES:-1000}
      CTX_DB_TIMEOUT_MS: ${CTX_DB_TIMEOUT_MS:-30000}
      S3_BUCKET: ${S3_BUCKET}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      CORS_ALLOW_PRIVATE_NETWORK: ${CORS_ALLOW_PRIVATE_NETWORK:-true}
      TRUSTED_PROXIES: ${TRUSTED_PROXIES:-}
      ENCODER_MAX_CONCURRENT: ${ENCODER_MAX_CONCURRENT:-2}
      ENCODER_FFMPEG_PARALLELISM: ${ENCODER_FFMPEG_PARALLELISM:-0}
      ENCODER_JOB_TIMEOUT_SECONDS: ${ENCODER_JOB_TIMEOUT_SECONDS:-1800}
      BI8S_TMP_DIR: ${BI8S_TMP_DIR:-/tmp}
      OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME:-bi8s-api}
      OTEL_ENABLED: "true"
      OTEL_EXPORTER_OTLP_ENDPOINT: otel-collector:4317
      OTEL_EXPORTER_OTLP_INSECURE: "true"
      OTEL_TRACES_ENABLED: "true"
      OTEL_METRICS_ENABLED: "true"
      OTEL_TRACES_SAMPLER_ARG: ${OTEL_TRACES_SAMPLER_ARG:-1.0}
      OTEL_METRIC_EXPORT_INTERVAL_SECONDS: ${OTEL_METRIC_EXPORT_INTERVAL_SECONDS:-15}
      OTEL_SHUTDOWN_TIMEOUT_SECONDS: ${OTEL_SHUTDOWN_TIMEOUT_SECONDS:-5}
      BUILD_VERSION: ${BUILD_VERSION:-dev}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      RATE_LIMIT_BACKEND: ${RATE_LIMIT_BACKEND:-redis}
      RATE_LIMIT_REDIS_FAIL_MODE: ${RATE_LIMIT_REDIS_FAIL_MODE:-fail-open}
      RATE_LIMIT_REDIS_TIMEOUT_MS: ${RATE_LIMIT_REDIS_TIMEOUT_MS:-50}
    depends_on:
      otel-collector:
        condition: service_started
      redis:
        condition: service_healthy
    networks: [ app-network ]
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:8080/v1/livez" ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 40s

  nginx:
    <<: [ *restart-policy, *default-logging ]
    image: nginx:alpine
    container_name: ${PROJECT_NAME:-bi8s}-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../nginx/conf.d:/etc/nginx/conf.d:ro
      - ../nginx/ssl:/etc/nginx/ssl:ro
      - ../nginx/certbot/www:/var/www/certbot:ro
    depends_on:
      api:
        condition: service_started
    networks: [ app-network ]
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://127.0.0.1/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3

  # ────────────────────────────── Redis ────────────────────────────────────
  # Co-located Redis for shared rate-limit state. For true multi-replica
  # deployments behind an ALB, replace with a managed Redis (ElastiCache)
  # and set REDIS_URL via SSM/Secrets Manager.
  redis:
    <<: [ *restart-policy, *default-logging ]
    image: redis:7-alpine
    container_name: ${PROJECT_NAME:-bi8s}-redis
    command:
      [
        "redis-server",
        "--save",
        "",
        "--appendonly",
        "no",
        "--maxmemory",
        "256mb",
        "--maxmemory-policy",
        "allkeys-lru",
      ]
    expose:
      - "6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 3s
      retries: 5
    networks: [ app-network ]

  # ────────────────────────── Observability stack ──────────────────────────
  otel-collector:
    <<: [ *restart-policy, *default-logging ]
    image: otel/opentelemetry-collector-contrib:0.111.0
    container_name: ${PROJECT_NAME:-bi8s}-otel-collector
    command: [ "--config=/etc/otelcol/config.yaml" ]
    volumes:
      - ./observability/otel-collector-config.yaml:/etc/otelcol/config.yaml:ro
    expose:
      - "4317"
      - "4318"
      - "8889"
    depends_on:
      tempo:
        condition: service_started
      loki:
        condition: service_started
    networks: [ app-network ]

  prometheus:
    <<: [ *restart-policy, *default-logging ]
    image: prom/prometheus:v2.55.1
    container_name: ${PROJECT_NAME:-bi8s}-prometheus
    user: root
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=${PROMETHEUS_RETENTION:-168h}"
      - "--web.enable-remote-write-receiver"
      - "--enable-feature=exemplar-storage"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./observability/prometheus-rules.yml:/etc/prometheus/rules/prometheus-rules.yml:ro
      - ../prometheus-data:/prometheus
    expose:
      - "9090"
    networks: [ app-network ]

  tempo:
    <<: [ *restart-policy, *default-logging ]
    image: grafana/tempo:2.6.1
    container_name: ${PROJECT_NAME:-bi8s}-tempo
    command: [ "-config.file=/etc/tempo/tempo.yaml", "-config.expand-env=true" ]
    environment:
      AWS_REGION: ${AWS_REGION}
      S3_BUCKET: ${S3_BUCKET:?S3_BUCKET is required}
    volumes:
      - ./observability/tempo.yaml:/etc/tempo/tempo.yaml:ro
      - tempo-data:/var/tempo
    expose:
      - "3200"
      - "4317"
      - "4318"
    networks: [ app-network ]

  loki:
    <<: [ *restart-policy, *default-logging ]
    image: grafana/loki:3.2.1
    container_name: ${PROJECT_NAME:-bi8s}-loki
    command: [ "-config.file=/etc/loki/loki-config.yaml", "-config.expand-env=true" ]
    environment:
      AWS_REGION: ${AWS_REGION}
      S3_BUCKET: ${S3_BUCKET:?S3_BUCKET is required}
    volumes:
      - ./observability/loki-config.yaml:/etc/loki/loki-config.yaml:ro
      - loki-data:/loki
    expose:
      - "3100"
    networks: [ app-network ]

  promtail:
    <<: [ *restart-policy, *default-logging ]
    image: grafana/promtail:3.2.1
    container_name: ${PROJECT_NAME:-bi8s}-promtail
    command: [ "-config.file=/etc/promtail/config.yaml" ]
    volumes:
      - ./observability/promtail-config.yaml:/etc/promtail/config.yaml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      loki:
        condition: service_started
    networks: [ app-network ]

  grafana:
    <<: [ *restart-policy, *default-logging ]
    image: grafana/grafana:11.3.0
    container_name: ${PROJECT_NAME:-bi8s}-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD is required}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_FEATURE_TOGGLES_ENABLE: "traceqlEditor traceToMetrics"
      GF_SERVER_ROOT_URL: "${GRAFANA_ROOT_URL:-https://grafana.xanderbilla.com/bi8s}"
      GF_SERVER_SERVE_FROM_SUB_PATH: "${GF_SERVER_SERVE_FROM_SUB_PATH:-true}"
      AWS_REGION: ${AWS_REGION}
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "4000:3000"
    depends_on:
      prometheus:
        condition: service_started
      tempo:
        condition: service_started
      loki:
        condition: service_started
    networks: [ app-network ]

  cadvisor:
    <<: [ *restart-policy, *default-logging ]
    image: gcr.io/cadvisor/cadvisor:v0.50.0
    container_name: ${PROJECT_NAME:-bi8s}-cadvisor
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
    command:
      - --docker_only=true
      - --store_container_labels=true
    expose:
      - "8080"
    networks: [ app-network ]

  node-exporter:
    <<: [ *restart-policy, *default-logging ]
    image: prom/node-exporter:v1.8.2
    container_name: ${PROJECT_NAME:-bi8s}-node-exporter
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--path.rootfs=/rootfs"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)(\
        $$|/)"
    expose:
      - "9100"
    networks: [ app-network ]

networks:
  app-network:
    driver: bridge

volumes:
  tempo-data:
  loki-data:
  grafana-data:
