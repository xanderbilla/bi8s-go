# Local-only nginx config used by docker-compose.local.yml under the `https`
# profile. Terminates TLS for BOTH the Go API and the UI on the same vhost
# so they share an origin (no CORS, single bookmark, single cert).
#
# Routing on https://localhost:
#   /v1/*    -> api  (http://api:8080)
#   /health  -> nginx (200 plain) — keeps ALB-style probes working
#   anything else -> ui (https://ui:8443, self-signed upstream)
#
# Differs from infra/docker/nginx/nginx.conf because:
#   - The prod conf.d/*.conf files are NOT included; we inline the server
#     blocks here to avoid bringing in prod-only ui/api split assumptions.
#   - Adds the docker embedded DNS resolver so the ui upstream can be
#     resolved lazily and nginx still boots if `ui` is started later.

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss;

    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    # Docker embedded DNS so upstreams can be resolved at request time.
    resolver 127.0.0.11 valid=30s ipv6=off;

    upstream api_backend {
        server api:8080;
    }

    upstream ui_backend {
        # UI image runs `next start` and listens on plain HTTP :3000.
        server ui:3000;
    }

    # --- HTTP :80 -> redirect to HTTPS (plus health probe) ---
    server {
        listen 80;
        server_name _;

        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # --- HTTPS :443 -> API on /v1, UI on / ---
    server {
        listen 443 ssl;
        http2 on;
        server_name _;

        ssl_certificate /etc/nginx/ssl/live/cert.crt;
        ssl_certificate_key /etc/nginx/ssl/live/cert.key;
        include snippets/ssl.conf;
        include snippets/security-headers.conf;

        client_max_body_size 100M;

        # Plain-text liveness for probes; doesn't touch upstreams.
        location = /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # API surface. Everything under /v1/ is served by the Go service.
        location /v1/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://api_backend;
            include snippets/proxy.conf;
        }

        # Everything else is the UI. The UI container serves plain HTTP on
        # :3000; nginx terminates TLS for it.
        location / {
            proxy_pass http://ui_backend;
            include snippets/proxy.conf;

            # UI uses websockets / streaming; proxy_http_version 1.1 comes from snippets/proxy.conf.
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
