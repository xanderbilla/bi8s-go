# Local-only nginx config used by docker-compose.local.yml under the `https`
# profile. Terminates TLS for the Go API.
#
# Routing on https://localhost (and https://100.98.33.20 via Tailscale):
#   /api/v1/*  -> api  (http://api:8080, strips /api prefix before proxying)
#   /health    -> nginx (200 plain) — keeps ALB-style probes working
#
# Port 8081 (plain-HTTP for Cloudflare Tunnel, domain api.taskstersolutions.com):
#   /v1/*      -> api  (http://api:8080, no prefix strip needed)
#   /api/v1/*  -> api  (http://api:8080, strips /api prefix)
#
# Differs from infra/docker/nginx/nginx.conf because:
#   - The prod conf.d/*.conf files are NOT included; we inline the server
#     blocks here to avoid bringing in prod-only assumptions.
#   - Adds the docker embedded DNS resolver so upstreams resolve at request time.

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss;

    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    # Docker embedded DNS so upstreams can be resolved at request time.
    resolver 127.0.0.11 valid=30s ipv6=off;

    upstream api_backend {
        server api:8080;
    }

    # --- HTTP :80 -> redirect to HTTPS (plus health probe) ---
    server {
        listen 80;
        server_name _;

        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # --- HTTP :8081 -> internal-only plain-HTTP entry point for Cloudflare Tunnel ---
    # Cloudflare terminates TLS at the edge; the cloudflared container connects
    # here via plain HTTP over the Docker-internal network (no TLS needed).
    # Set your tunnel public hostname origin to http://nginx:8081
    server {
        listen 8081;
        server_name _;

        # Cloudflare path fallback: emit CORS headers from nginx so browser CORS
        # remains stable even if edge/tunnel handling drops origin-matched headers.
        add_header Access-Control-Allow-Origin "https://dev.d3uphs6spds7z1.amplifyapp.com" always;
        add_header Access-Control-Allow-Credentials "true" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Accept, Authorization, Content-Type, X-CSRF-Token, Access-Control-Request-Private-Network" always;
        add_header Access-Control-Expose-Headers "Link, X-Request-Id" always;

        location = /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # /v1/* — direct API path used by the api.taskstersolutions.com tunnel hostname.
        # Cloudflare sends requests with path /v1/... so no prefix stripping needed.
        location /v1/ {
            if ($request_method = OPTIONS) {
                return 204;
            }

            limit_req zone=api_limit burst=20 nodelay;
            proxy_hide_header Access-Control-Allow-Origin;
            proxy_hide_header Access-Control-Allow-Credentials;
            proxy_hide_header Access-Control-Allow-Methods;
            proxy_hide_header Access-Control-Allow-Headers;
            proxy_hide_header Access-Control-Expose-Headers;
            proxy_pass http://api_backend;
            include snippets/proxy.conf;
        }

        # /api/v1/* — convenience alias; strips /api prefix before forwarding.
        location /api/v1/ {
            if ($request_method = OPTIONS) {
                return 204;
            }

            limit_req zone=api_limit burst=20 nodelay;
            rewrite ^/api(/v1/.*)$ $1 break;
            proxy_hide_header Access-Control-Allow-Origin;
            proxy_hide_header Access-Control-Allow-Credentials;
            proxy_hide_header Access-Control-Allow-Methods;
            proxy_hide_header Access-Control-Allow-Headers;
            proxy_hide_header Access-Control-Expose-Headers;
            proxy_pass http://api_backend;
            include snippets/proxy.conf;
        }
    }

    # --- HTTPS :443 -> API on /api/v1 ---
    server {
        listen 443 ssl;
        http2 on;
        server_name localhost 127.0.0.1 100.98.33.20 _;

        ssl_certificate /etc/nginx/ssl/live/cert.crt;
        ssl_certificate_key /etc/nginx/ssl/live/cert.key;
        include snippets/ssl.conf;
        include snippets/security-headers.conf;

        client_max_body_size 100M;

        # Plain-text liveness for probes; doesn't touch upstreams.
        location = /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # /v1/* — direct API path for clients configured without the /api prefix.
        location /v1/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://api_backend;
            include snippets/proxy.conf;
        }

        # API surface. Everything under /api/v1/ is served by the Go service.
        # nginx strips the /api prefix before forwarding so the Go app still
        # sees /v1/* internally — no backend changes required.
        location /api/v1/ {
            limit_req zone=api_limit burst=20 nodelay;
            rewrite ^/api(/v1/.*)$ $1 break;
            proxy_pass http://api_backend;
            include snippets/proxy.conf;
        }
    }
}
