# Top-level Nginx config. Used as the CI smoke-test entry point and as the
# canonical reference for the production layout that user-data.sh.tpl renders
# at boot (see infra/tofu/envs/_shared/user-data.sh.tpl). Server blocks live
# in conf.d/*.conf; reusable directive sets live in snippets/*.conf.

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss;

    # Rate limiting (per-IP). Server blocks opt in via `limit_req zone=api_limit`.
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    # Upstreams
    upstream api_backend {
        server api:8080;
    }

    upstream ui_backend {
        server ui:8443;
    }

    include conf.d/*.conf;
}
