# API server: HTTP -> HTTPS redirect + reverse-proxy to the Go API container.

server {
    listen 80;
    server_name _;

    # Health check stays on plain HTTP for ALB / ELB / curl probes.
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # ACME http-01 challenge path (used by certbot in setup-ssl-letsencrypt.sh).
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name _;

    ssl_certificate /etc/nginx/ssl/live/cert.crt;
    ssl_certificate_key /etc/nginx/ssl/live/cert.key;
    include snippets/ssl.conf;
    include snippets/security-headers.conf;

    client_max_body_size 100M;

    location / {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://api_backend;
        include snippets/proxy.conf;
    }

    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}
