# UI server (optional). Activated when the `ui` profile is enabled in
# docker-compose AND a separate hostname is provisioned (e.g. ui.example.com).
# Disabled by default to avoid clashing with the API server on `_`.
#
# To enable: set the `server_name` to your UI hostname and provision DNS +
# certs (Let's Encrypt covers it via the same certbot path).

