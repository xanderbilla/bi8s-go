name: nightly

# Nightly slow-burn checks: short fuzz runs and a dependency-review pass on
# the default branch. These are advisory -- failures do not block merges,
# but they surface fresh CVEs and fuzz crashes that the per-PR pipeline
# misses for cost/runtime reasons.

on:
    schedule:
        # 03:17 UTC daily -- offset off the hour to spread runner load.
        - cron: "17 3 * * *"
    workflow_dispatch:

permissions:
    contents: read

env:
    GO_VERSION: "1.25.0"

jobs:
    fuzz:
        name: short fuzz (advisory)
        runs-on: ubuntu-latest
        continue-on-error: true
        defaults:
            run:
                working-directory: app
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-go@v5
              with:
                  go-version: ${{ env.GO_VERSION }}
                  cache-dependency-path: app/go.sum

            # Each fuzz target runs for a bounded budget so the whole job stays
            # under ~10 minutes. New crashers land in testdata/ as failing
            # corpus entries on the next normal `go test` run.
            - name: Fuzz ParseMovieFromForm (60s)
              run: go test ./internal/http/... -run=^$ -fuzz=FuzzParseMovieFromForm -fuzztime=60s

            - name: Fuzz ParsePersonFromForm (60s)
              run: go test ./internal/http/... -run=^$ -fuzz=FuzzParsePersonFromForm -fuzztime=60s

            - name: Fuzz ParseAttributeFromForm (60s)
              run: go test ./internal/http/... -run=^$ -fuzz=FuzzParseAttributeFromForm -fuzztime=60s

    govulncheck-fresh:
        name: govulncheck (fresh DB, advisory)
        runs-on: ubuntu-latest
        continue-on-error: true
        defaults:
            run:
                working-directory: app
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-go@v5
              with:
                  go-version: ${{ env.GO_VERSION }}
                  cache-dependency-path: app/go.sum

            # Re-run govulncheck against the latest Go vulnerability DB to
            # surface CVEs disclosed since the last PR ran.
            - name: Install govulncheck
              run: go install golang.org/x/vuln/cmd/govulncheck@v1.1.3
            - name: Run govulncheck
              run: govulncheck ./...
