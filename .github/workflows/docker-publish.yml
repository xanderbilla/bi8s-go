name: Build and Push Docker Image

on:
  push:
    branches:
      - dev
    paths:
      - appl/cmd/**
      - appl/internal/**
      - appl/Dockerfile
      - appl/.air.toml
      - appl/Makefile
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

env:
  DOCKER_IMAGE: ${{ secrets.DOCKER_IMAGE }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  docker:
    name: Build and Push Multi-Platform Image
    runs-on: ubuntu-latest

    steps:
      # Pull repository code at the commit that triggered this workflow.
      - name: Checkout source
        uses: actions/checkout@v4

      # Enable emulation so we can build for multiple CPU architectures.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # Configure Docker Buildx for modern multi-platform builds.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Authenticate to Docker Hub with repository secrets.
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.DOCKER_REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Build and push image manifests for linux/amd64 and linux/arm64.
      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./appl
          file: ./appl/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.DOCKER_IMAGE }}:latest
            ${{ env.DOCKER_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
