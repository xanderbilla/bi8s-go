name: Infrastructure Deployment

on:
  push:
    branches:
      - dev
      - prod
    paths:
      - "infra/**"
      - ".github/workflows/infra-deploy.yml"
  pull_request:
    branches:
      - dev
      - prod
    paths:
      - "infra/**"
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy"
        required: true
        type: choice
        options:
          - dev
          - prod
      action:
        description: "Action to perform"
        required: true
        type: choice
        options:
          - plan
          - apply
          - destroy

# OIDC requires id-token: write. contents: read for actions/checkout.
permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  TF_VERSION: "1.6.0"
  AWS_REGION: ${{ secrets.AWS_REGION }}
  PROJECT_NAME: ${{ secrets.PROJECT_NAME }}
  EC2_KEY_NAME: ${{ secrets.EC2_KEY_NAME }}
  EC2_AMI_ID: ${{ secrets.EC2_AMI_ID }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  detect-environment:
    name: Detect Environment
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.set-env.outputs.environment }}
      should_apply: ${{ steps.set-env.outputs.should_apply }}
    steps:
      - name: Determine Environment
        id: set-env
        run: |
          ENV=""
          APPLY="false"

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            ENV="${{ github.event.inputs.environment }}"
            # Manual apply allowed for both envs (prod gated by GitHub Environment reviewers).
            if [[ "${{ github.event.inputs.action }}" == "apply" ]]; then
              APPLY="true"
            fi
          elif [[ "${{ github.ref }}" == "refs/heads/prod" ]]; then
            # CRITICAL: prod push runs PLAN ONLY. Apply requires manual
            # workflow_dispatch with reviewer approval (B5).
            ENV="prod"
            APPLY="false"
          elif [[ "${{ github.ref }}" == "refs/heads/dev" ]]; then
            ENV="dev"
            APPLY="true"
          elif [[ "${{ github.event_name }}" == "pull_request" ]]; then
            if [[ "${{ github.base_ref }}" == "prod" ]]; then
              ENV="prod"
            else
              ENV="dev"
            fi
            APPLY="false"
          else
            ENV="dev"
            APPLY="false"
          fi

          echo "environment=${ENV}" >> $GITHUB_OUTPUT
          echo "should_apply=${APPLY}" >> $GITHUB_OUTPUT
          echo "Detected environment: ${ENV}"
          echo "Should apply: ${APPLY}"

  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: detect-environment
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.action !=
      'destroy'
    # Plan binds to the env so the role secret resolves; prod plan does NOT
    # require reviewer approval (read-only).
    environment: ${{ needs.detect-environment.outputs.environment }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          role-session-name: gha-tofu-plan-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: ${{ env.TF_VERSION }}

      - name: Terraform Format Check
        id: fmt
        run: |
          cd infra/tofu/envs/${{ needs.detect-environment.outputs.environment }}
          tofu fmt -check -recursive
        continue-on-error: true

      - name: Terraform Init
        id: init
        run: |
          cd infra/tofu/envs/${{ needs.detect-environment.outputs.environment }}

          # Bootstrap (state bucket + lock table + OIDC role) is a one-shot
          # operation done out-of-band by an operator. CI is NOT permitted to
          # bootstrap because it would require admin credentials. Fail fast
          # if the backend config is missing.
          if [ ! -f "backend-${{ needs.detect-environment.outputs.environment }}.hcl" ]; then
            echo "::error::Backend config backend-${{ needs.detect-environment.outputs.environment }}.hcl not found." \
                 "Run infra/tofu/bootstrap manually first (see docs/oidc-bootstrap.md)."
            exit 1
          fi

          tofu init -backend-config=backend-${{ needs.detect-environment.outputs.environment }}.hcl

      - name: Terraform Validate
        id: validate
        run: |
          cd infra/tofu/envs/${{ needs.detect-environment.outputs.environment }}
          tofu validate -no-color

      - name: Terraform Plan
        id: plan
        env:
          TF_VAR_grafana_admin_password: ${{ secrets.GRAFANA_ADMIN_PASSWORD }}
        run: |
          cd infra/tofu/envs/${{ needs.detect-environment.outputs.environment }}
          tofu plan -no-color -out=tfplan \
            -var="project_name=${{ env.PROJECT_NAME }}" \
            -var="ami_id=${{ env.EC2_AMI_ID }}" \
            -var="key_name=${{ env.EC2_KEY_NAME }}"

      - name: Upload Plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ needs.detect-environment.outputs.environment }}
          path: infra/tofu/envs/${{ needs.detect-environment.outputs.environment }}/tfplan
          retention-days: 5

      - name: Comment PR
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        env:
          PLAN: "${{ steps.plan.outputs.stdout }}"
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const output = `#### Terraform Format and Style 🖌\`${{ steps.fmt.outcome }}\`
            #### Terraform Initialization ⚙️\`${{ steps.init.outcome }}\`
            #### Terraform Validation 🤖\`${{ steps.validate.outcome }}\`
            #### Terraform Plan 📖\`${{ steps.plan.outcome }}\`

            <details><summary>Show Plan</summary>

            \`\`\`terraform
            ${process.env.PLAN}
            \`\`\`

            </details>

            *Environment: \`${{ needs.detect-environment.outputs.environment }}\`*
            *Pusher: @${{ github.actor }}, Action: \`${{ github.event_name }}\`*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            })

  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: [ detect-environment, terraform-plan ]
    # Apply runs only when:
    #   - dev push (auto), OR
    #   - workflow_dispatch with action=apply (gated by GitHub Environment
    #     reviewers for prod -- configure required-reviewers on `prod`).
    if: needs.detect-environment.outputs.should_apply == 'true'
    environment:
      name: ${{ needs.detect-environment.outputs.environment }}
      url: ${{ steps.output.outputs.ec2_url }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          role-session-name: gha-tofu-apply-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: ${{ env.TF_VERSION }}

      - name: Download Plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ needs.detect-environment.outputs.environment }}
          path: infra/tofu/envs/${{ needs.detect-environment.outputs.environment }}

      - name: Terraform Init
        run: |
          cd infra/tofu/envs/${{ needs.detect-environment.outputs.environment }}
          tofu init -backend-config=backend-${{ needs.detect-environment.outputs.environment }}.hcl

      - name: Terraform Apply
        id: apply
        run: |
          cd infra/tofu/envs/${{ needs.detect-environment.outputs.environment }}
          tofu apply -auto-approve tfplan

      - name: Get Outputs
        id: output
        run: |
          cd infra/tofu/envs/${{ needs.detect-environment.outputs.environment }}
          EC2_IP=$(tofu output -raw ec2_public_ip)
          PROMETHEUS_EBS=$(tofu output -raw prometheus_ebs_volume_id 2>/dev/null || echo "n/a")
          echo "ec2_ip=${EC2_IP}" >> $GITHUB_OUTPUT
          echo "ec2_url=https://${EC2_IP}/v1" >> $GITHUB_OUTPUT

          {
            echo "### Infrastructure Deployed Successfully! 🚀"
            echo ""
            echo "**Environment:** ${{ needs.detect-environment.outputs.environment }}"
            echo "**EC2 Public IP:** ${EC2_IP}"
            echo "**Application URL:** https://${EC2_IP}/v1"
            echo "**Health Check:** https://${EC2_IP}/v1/health"
            echo ""
            echo "#### Resources"
            echo "**Prometheus EBS Volume:** ${PROMETHEUS_EBS}"
          } >> $GITHUB_STEP_SUMMARY

      - name: Save Infrastructure Outputs
        run: |
          cd infra/tofu/envs/${{ needs.detect-environment.outputs.environment }}
          tofu output -json > outputs.json

      - name: Upload Outputs
        uses: actions/upload-artifact@v4
        with:
          name: infra-outputs-${{ needs.detect-environment.outputs.environment }}
          path: infra/tofu/envs/${{ needs.detect-environment.outputs.environment
            }}/outputs.json
          retention-days: 30

  terraform-destroy:
    name: Terraform Destroy
    runs-on: ubuntu-latest
    needs: detect-environment
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action ==
      'destroy'
    # Destroy uses a separate environment so you can require additional
    # reviewers on `<env>-destroy` independently of normal applies.
    environment:
      name: ${{ needs.detect-environment.outputs.environment }}-destroy
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          role-session-name: gha-tofu-destroy-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: |
          cd infra/tofu/envs/${{ needs.detect-environment.outputs.environment }}
          tofu init -backend-config=backend-${{ needs.detect-environment.outputs.environment }}.hcl

      - name: Terraform Destroy
        env:
          TF_VAR_grafana_admin_password: ${{ secrets.GRAFANA_ADMIN_PASSWORD }}
        run: |
          cd infra/tofu/envs/${{ needs.detect-environment.outputs.environment }}
          tofu destroy -auto-approve \
            -var="project_name=${{ env.PROJECT_NAME }}" \
            -var="ami_id=${{ env.EC2_AMI_ID }}" \
            -var="key_name=${{ env.EC2_KEY_NAME }}"

          {
            echo "### Infrastructure Destroyed 💥"
            echo ""
            echo "**Environment:** ${{ needs.detect-environment.outputs.environment }}"
          } >> $GITHUB_STEP_SUMMARY
