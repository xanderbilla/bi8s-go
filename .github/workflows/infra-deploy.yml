name: Infrastructure Deployment

on:
  push:
    branches:
      - dev
      - prod
    paths:
      - "infra/**"
      - ".github/workflows/infra-deploy.yml"
  pull_request:
    branches:
      - dev
      - prod
    paths:
      - "infra/**"
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy"
        required: true
        type: choice
        options:
          - dev
          - prod
      action:
        description: "Action to perform"
        required: true
        type: choice
        options:
          - plan
          - apply
          - destroy

env:
  TF_VERSION: "1.6.0"
  AWS_REGION: ${{ secrets.AWS_REGION }}
  PROJECT_NAME: ${{ secrets.PROJECT_NAME }}
  EC2_KEY_NAME: ${{ secrets.EC2_KEY_NAME }}
  EC2_AMI_ID: ${{ secrets.EC2_AMI_ID }}
  DOCKER_REGISTRY: "docker.io"
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  detect-environment:
    name: Detect Environment
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.set-env.outputs.environment }}
      should_deploy: ${{ steps.set-env.outputs.should_deploy }}
    steps:
      - name: Determine Environment
        id: set-env
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            # Manual trigger - use selected environment
            echo "environment=${{ github.event.inputs.environment }}" >> $GITHUB_OUTPUT
            echo "should_deploy=true" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == "refs/heads/prod" ]]; then
            # Push to prod branch - deploy to prod
            echo "environment=prod" >> $GITHUB_OUTPUT
            echo "should_deploy=true" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == "refs/heads/dev" ]]; then
            # Push to dev branch - deploy to dev
            echo "environment=dev" >> $GITHUB_OUTPUT
            echo "should_deploy=true" >> $GITHUB_OUTPUT
          elif [[ "${{ github.event_name }}" == "pull_request" ]]; then
            # Pull request - determine target environment but don't deploy
            if [[ "${{ github.base_ref }}" == "prod" ]]; then
              echo "environment=prod" >> $GITHUB_OUTPUT
            else
              echo "environment=dev" >> $GITHUB_OUTPUT
            fi
            echo "should_deploy=false" >> $GITHUB_OUTPUT
          else
            echo "environment=dev" >> $GITHUB_OUTPUT
            echo "should_deploy=false" >> $GITHUB_OUTPUT
          fi

          echo "Detected environment: $(cat $GITHUB_OUTPUT | grep environment | cut -d'=' -f2)"
          echo "Should deploy: $(cat $GITHUB_OUTPUT | grep should_deploy | cut -d'=' -f2)"

  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: detect-environment
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.action !=
      'destroy'
    environment: ${{ needs.detect-environment.outputs.environment }}
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: ${{ env.TF_VERSION }}

      - name: Terraform Format Check
        id: fmt
        run: |
          cd infra/tofu/envs/${{ needs.detect-environment.outputs.environment }}
          tofu fmt -check -recursive
        continue-on-error: true

      - name: Terraform Init
        id: init
        run: |
          cd infra/tofu/envs/${{ needs.detect-environment.outputs.environment }}

          # Check if backend config exists
          if [ ! -f "backend-${{ needs.detect-environment.outputs.environment }}.hcl" ]; then
            echo "Backend config not found. Creating backend resources..."
            cd ../../bootstrap
            tofu init
            tofu apply -auto-approve \
              -var="project_name=${{ env.PROJECT_NAME }}" \
              -var="environment=${{ needs.detect-environment.outputs.environment }}" \
              -var="aws_region=${{ env.AWS_REGION }}"
            
            # Get backend config
            BUCKET=$(tofu output -raw state_bucket_name)
            TABLE=$(tofu output -raw lock_table_name)
            
            # Create backend config
            cd ../envs/${{ needs.detect-environment.outputs.environment }}
            cat > backend-${{ needs.detect-environment.outputs.environment }}.hcl <<EOF
          bucket         = "${BUCKET}"
          key            = "${{ env.PROJECT_NAME }}/${{ needs.detect-environment.outputs.environment }}/terraform.tfstate"
          region         = "${{ env.AWS_REGION }}"
          dynamodb_table = "${TABLE}"
          encrypt        = true
          EOF
          fi

          tofu init -backend-config=backend-${{ needs.detect-environment.outputs.environment }}.hcl

      - name: Terraform Validate
        id: validate
        run: |
          cd infra/tofu/envs/${{ needs.detect-environment.outputs.environment }}
          tofu validate -no-color

      - name: Terraform Plan
        id: plan
        run: |
          cd infra/tofu/envs/${{ needs.detect-environment.outputs.environment }}
          tofu plan -no-color -out=tfplan \
            -var="project_name=${{ env.PROJECT_NAME }}" \
            -var="ami_id=${{ env.EC2_AMI_ID }}" \
            -var="key_name=${{ env.EC2_KEY_NAME }}" \
            -var="image_name=${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_USERNAME }}/${{ env.PROJECT_NAME }}-${{ needs.detect-environment.outputs.environment }}:latest"
        continue-on-error: false

      - name: Upload Plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ needs.detect-environment.outputs.environment }}
          path: infra/tofu/envs/${{ needs.detect-environment.outputs.environment }}/tfplan
          retention-days: 5

      - name: Comment PR
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        env:
          PLAN: "${{ steps.plan.outputs.stdout }}"
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const output = `#### Terraform Format and Style 🖌\`${{ steps.fmt.outcome }}\`
            #### Terraform Initialization ⚙️\`${{ steps.init.outcome }}\`
            #### Terraform Validation 🤖\`${{ steps.validate.outcome }}\`
            #### Terraform Plan 📖\`${{ steps.plan.outcome }}\`

            <details><summary>Show Plan</summary>

            \`\`\`terraform
            ${process.env.PLAN}
            \`\`\`

            </details>

            *Environment: \`${{ needs.detect-environment.outputs.environment }}\`*
            *Pusher: @${{ github.actor }}, Action: \`${{ github.event_name }}\`*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            })

  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: [ detect-environment, terraform-plan ]
    if: |
      needs.detect-environment.outputs.should_deploy == 'true' &&
      (github.event_name == 'push' || 
       (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply'))
    environment:
      name: ${{ needs.detect-environment.outputs.environment }}
      url: ${{ steps.output.outputs.ec2_url }}
    permissions:
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: ${{ env.TF_VERSION }}

      - name: Download Plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ needs.detect-environment.outputs.environment }}
          path: infra/tofu/envs/${{ needs.detect-environment.outputs.environment }}

      - name: Terraform Init
        run: |
          cd infra/tofu/envs/${{ needs.detect-environment.outputs.environment }}
          tofu init -backend-config=backend-${{ needs.detect-environment.outputs.environment }}.hcl

      - name: Terraform Apply
        id: apply
        run: |
          cd infra/tofu/envs/${{ needs.detect-environment.outputs.environment }}
          tofu apply -auto-approve tfplan

      - name: Get Outputs
        id: output
        run: |
          cd infra/tofu/envs/${{ needs.detect-environment.outputs.environment }}
          EC2_IP=$(tofu output -raw ec2_public_ip)
          PROMETHEUS_EBS=$(tofu output -raw prometheus_ebs_volume_id)
          echo "ec2_ip=${EC2_IP}" >> $GITHUB_OUTPUT
          echo "ec2_url=https://${EC2_IP}/v1" >> $GITHUB_OUTPUT

          echo "### Infrastructure Deployed Successfully! 🚀" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** ${{ needs.detect-environment.outputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "**EC2 Public IP:** ${EC2_IP}" >> $GITHUB_STEP_SUMMARY
          echo "**Application URL:** https://${EC2_IP}/v1" >> $GITHUB_STEP_SUMMARY
          echo "**Health Check:** https://${EC2_IP}/v1/health" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "#### Resources" >> $GITHUB_STEP_SUMMARY
          echo "**Prometheus EBS Volume:** ${PROMETHEUS_EBS}" >> $GITHUB_STEP_SUMMARY

      - name: Save Infrastructure Outputs
        run: |
          cd infra/tofu/envs/${{ needs.detect-environment.outputs.environment }}
          tofu output -json > outputs.json

      - name: Upload Outputs
        uses: actions/upload-artifact@v4
        with:
          name: infra-outputs-${{ needs.detect-environment.outputs.environment }}
          path: infra/tofu/envs/${{ needs.detect-environment.outputs.environment
            }}/outputs.json
          retention-days: 30

  terraform-destroy:
    name: Terraform Destroy
    runs-on: ubuntu-latest
    needs: detect-environment
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action ==
      'destroy'
    environment:
      name: ${{ needs.detect-environment.outputs.environment }}-destroy
    permissions:
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: |
          cd infra/tofu/envs/${{ needs.detect-environment.outputs.environment }}
          tofu init -backend-config=backend-${{ needs.detect-environment.outputs.environment }}.hcl

      - name: Terraform Destroy
        run: |
          cd infra/tofu/envs/${{ needs.detect-environment.outputs.environment }}
          tofu destroy -auto-approve \
            -var="project_name=${{ env.PROJECT_NAME }}" \
            -var="ami_id=${{ env.EC2_AMI_ID }}" \
            -var="key_name=${{ env.EC2_KEY_NAME }}" \
            -var="image_name=${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_USERNAME }}/${{ env.PROJECT_NAME }}-${{ needs.detect-environment.outputs.environment }}:latest"

          echo "### Infrastructure Destroyed 💥" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** ${{ needs.detect-environment.outputs.environment }}" >> $GITHUB_STEP_SUMMARY
