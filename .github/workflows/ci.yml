name: CI

on:
    push:
        branches:
            - dev
            - prod
    pull_request:
        branches:
            - dev
            - prod
    workflow_dispatch:

permissions:
    contents: read

concurrency:
    group: ci-${{ github.ref }}
    cancel-in-progress: true

env:
    GO_VERSION: "1.25.0"

jobs:
    go-vet:
        name: go vet
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: app
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-go@v5
              with:
                  go-version: ${{ env.GO_VERSION }}
                  cache-dependency-path: app/go.sum
            - run: go mod download
            - run: go vet ./...

    go-test:
        name: go test (race + cover)
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: app
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-go@v5
              with:
                  go-version: ${{ env.GO_VERSION }}
                  cache-dependency-path: app/go.sum
            - run: go mod download
            - name: Run tests with race + coverage
              run: |
                  go test -race -count=1 -covermode=atomic -coverprofile=coverage.out ./...
                  go tool cover -func=coverage.out | tail -1
            - name: Upload coverage artifact
              uses: actions/upload-artifact@v4
              with:
                  name: go-coverage
                  path: app/coverage.out
                  retention-days: 7

    golangci-lint:
        name: golangci-lint
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-go@v5
              with:
                  go-version: ${{ env.GO_VERSION }}
                  cache-dependency-path: app/go.sum
            - uses: golangci/golangci-lint-action@v6
              with:
                  version: latest
                  working-directory: app
                  args: --timeout=5m

    govulncheck:
        name: govulncheck
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: app
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-go@v5
              with:
                  go-version: ${{ env.GO_VERSION }}
                  cache-dependency-path: app/go.sum
            - name: Install govulncheck
              run: go install golang.org/x/vuln/cmd/govulncheck@latest
            - run: govulncheck ./...

    openapi-lint:
        name: openapi lint (redocly)
        runs-on: ubuntu-latest
        # Advisory only: docs/openapi.yaml has pre-existing lint debt that is
        # tracked separately. Surface findings without blocking the PR.
        continue-on-error: true
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: "20"
            - name: Lint OpenAPI spec
              run: npx --yes @redocly/cli@latest lint docs/openapi.yaml

    compose-config:
        name: docker compose config
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - name: Validate local compose
              run: docker compose -f docker-compose.local.yml config --quiet
            - name: Validate prod compose
              env:
                  AWS_REGION: us-east-1
                  APP_ENV: prod
                  DYNAMODB_MOVIE_TABLE: bi8s-content-table-prod
                  DYNAMODB_PERSON_TABLE: bi8s-person-table-prod
                  DYNAMODB_ATTRIBUTE_TABLE: bi8s-attributes-table-prod
                  DYNAMODB_ENCODER_TABLE: bi8s-video-table-prod
                  S3_BUCKET: bi8s-storage-prod
                  CORS_ALLOWED_ORIGINS: "*"
                  PUBLIC_IP: "127.0.0.1"
                  GRAFANA_ADMIN_PASSWORD: "ci-validation-only"
              run: docker compose -f infra/docker/docker-compose.yml config --quiet

    tofu:
        name: tofu fmt + validate (${{ matrix.env }})
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                env: [ dev, prod ]
        defaults:
            run:
                working-directory: infra/tofu/envs/${{ matrix.env }}
        steps:
            - uses: actions/checkout@v4
            - uses: opentofu/setup-opentofu@v1
              with:
                  tofu_version: "1.6.0"
            - name: tofu fmt check
              run: tofu fmt -recursive -check ../..
            - name: tofu init (no backend)
              run: tofu init -backend=false -input=false
            - name: tofu validate
              run: tofu validate

    trivy-fs:
        name: trivy fs scan
        runs-on: ubuntu-latest
        # Advisory only until vulnerability triage is wired into a dedicated
        # security workflow. Findings are uploaded as job logs.
        continue-on-error: true
        steps:
            - uses: actions/checkout@v4
            - name: Run Trivy filesystem scan
              uses: aquasecurity/trivy-action@0.24.0
              with:
                  scan-type: fs
                  scan-ref: .
                  severity: CRITICAL,HIGH
                  exit-code: "1"
                  ignore-unfixed: true
                  skip-dirs: tmp,assets
