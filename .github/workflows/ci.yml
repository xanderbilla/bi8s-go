name: CI

on:
    push:
        branches:
            - dev
            - prod
    pull_request:
        branches:
            - dev
            - prod
    workflow_dispatch:

permissions:
    contents: read

concurrency:
    group: ci-${{ github.ref }}
    cancel-in-progress: true

env:
    GO_VERSION: "1.25.0"
    # golangci-lint v2.x is required because .golangci.yml uses `version: "2"`
    # schema. v1.x cannot parse this and will fail on boot.
    GOLANGCI_LINT_VERSION: "v2.1.6"
    STATICCHECK_VERSION: "2024.1.1"
    GOVULNCHECK_VERSION: "v1.1.3"
    GOSEC_VERSION: "v2.21.4"

jobs:
    go-vet:
        name: go vet
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: app
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-go@v5
              with:
                  go-version: ${{ env.GO_VERSION }}
                  cache-dependency-path: app/go.sum
            - run: go mod download
            - run: go vet ./...

    go-test:
        name: go test (race + cover)
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: app
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-go@v5
              with:
                  go-version: ${{ env.GO_VERSION }}
                  cache-dependency-path: app/go.sum
            - run: go mod download
            - name: Run tests with race + coverage
              run: |
                  go test -race -count=1 -covermode=atomic -coverprofile=coverage.out ./...
                  go tool cover -func=coverage.out | tail -1
            - name: Upload coverage artifact
              uses: actions/upload-artifact@v4
              with:
                  name: go-coverage
                  path: app/coverage.out
                  retention-days: 7

    golangci-lint:
        name: golangci-lint
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-go@v5
              with:
                  go-version: ${{ env.GO_VERSION }}
                  cache-dependency-path: app/go.sum
            - uses: golangci/golangci-lint-action@v7
              with:
                  version: ${{ env.GOLANGCI_LINT_VERSION }}
                  working-directory: app
                  args: --timeout=5m

    govulncheck:
        name: govulncheck
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: app
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-go@v5
              with:
                  go-version: ${{ env.GO_VERSION }}
                  cache-dependency-path: app/go.sum
            - name: Install govulncheck
              run: go install golang.org/x/vuln/cmd/govulncheck@${{ env.GOVULNCHECK_VERSION }}
            - run: govulncheck ./...

    staticcheck:
        name: staticcheck
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: app
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-go@v5
              with:
                  go-version: ${{ env.GO_VERSION }}
                  cache-dependency-path: app/go.sum
            - name: Install staticcheck
              run: go install honnef.co/go/tools/cmd/staticcheck@${{ env.STATICCHECK_VERSION }}
            - run: staticcheck ./...

    gosec:
        name: gosec
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: app
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-go@v5
              with:
                  go-version: ${{ env.GO_VERSION }}
                  cache-dependency-path: app/go.sum
            - name: Install gosec
              run: go install github.com/securego/gosec/v2/cmd/gosec@${{ env.GOSEC_VERSION }}
              # Excluded rules (justification):
              #   G101: Lua script literal in redis ratelimit backend (false positive)
              #   G115: int conversion overflow — covered by validation layer
              #   G120: ParseMultipartForm — bounded via http.MaxBytesReader upstream
              #   G204: ffmpeg subprocess — args are filepath.Clean'd allowlist
              #   G301/G306: media file/dir perms — required for nginx static serve
              #   G304: file open via variable — paths sourced from trusted config/env
              #   G703: tempfile cleanup — name created by os.CreateTemp
            - run: gosec -quiet -exclude=G101,G115,G120,G204,G301,G304,G306,G703 -fmt text ./...

    nginx-validate:
        name: nginx config syntax
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - name: Validate split nginx layout (syntax only)
              # Stage the canonical nginx tree, swap docker-network upstreams
              # for loopback so DNS resolution does not fail at parse time,
              # generate a throwaway cert/key for the SSL directives, then
              # let `nginx -t` parse the full include tree.
              run: |
                  set -euo pipefail
                  STAGE=$(mktemp -d)
                  cp -a infra/docker/nginx/. "$STAGE/"
                  mkdir -p "$STAGE/ssl/live"
                  sed -i 's|server api:8080|server 127.0.0.1:8080|; s|server ui:8443|server 127.0.0.1:8443|' "$STAGE/nginx.conf"
                  docker run --rm -v "$STAGE":/tmp/cfg:ro nginx:alpine sh -c '
                      apk add --no-cache openssl >/dev/null 2>&1
                      cp -a /tmp/cfg/. /etc/nginx/
                      openssl req -x509 -newkey rsa:2048 -nodes -days 1 \
                          -subj "/CN=ci" \
                          -keyout /etc/nginx/ssl/live/cert.key \
                          -out    /etc/nginx/ssl/live/cert.crt >/dev/null 2>&1
                      nginx -t
                  '

    openapi-lint:
        name: openapi lint (redocly)
        runs-on: ubuntu-latest
        # Spec is kept clean (no baselined findings); regressions fail.
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: "20"
            - name: Lint OpenAPI spec
              run: npx --yes @redocly/cli@latest lint docs/openapi.yaml

    compose-config:
        name: docker compose config
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - name: Validate local compose
              run: docker compose -f docker-compose.local.yml config --quiet
            - name: Validate prod compose
              env:
                  AWS_REGION: us-east-1
                  APP_ENV: prod
                  DYNAMODB_CONTENT_TABLE: bi8s-content-table-prod
                  DYNAMODB_PERSON_TABLE: bi8s-person-table-prod
                  DYNAMODB_ATTRIBUTE_TABLE: bi8s-attributes-table-prod
                  DYNAMODB_ENCODER_TABLE: bi8s-video-table-prod
                  S3_BUCKET: bi8s-storage-prod
                  CORS_ALLOWED_ORIGINS: "*"
                  PUBLIC_IP: "127.0.0.1"
                  GRAFANA_ADMIN_PASSWORD: "ci-validation-only"
              run: docker compose -f infra/docker/docker-compose.yml config --quiet

    tofu:
        name: tofu fmt + validate (${{ matrix.env }})
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                env: [dev, prod]
        defaults:
            run:
                working-directory: infra/tofu/envs/${{ matrix.env }}
        steps:
            - uses: actions/checkout@v4
            - uses: opentofu/setup-opentofu@v1
              with:
                  tofu_version: "1.6.0"
            - name: tofu fmt check
              run: tofu fmt -recursive -check ../..
            - name: tofu init (no backend)
              run: tofu init -backend=false -input=false
            - name: tofu validate
              run: tofu validate

    tflint:
        name: tflint
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: terraform-linters/setup-tflint@v4
              with:
                  tflint_version: v0.52.0
            - name: Init TFLint plugins
              run: tflint --init
              working-directory: infra/tofu
            - name: Run TFLint (modules + envs)
              run: tflint --recursive --minimum-failure-severity=error
              working-directory: infra/tofu

    tfsec:
        name: tfsec
        runs-on: ubuntu-latest
        # Baseline exclusions live in infra/tofu/.tfsec/config.yml with
        # written justification per rule. Regressions fail the build.
        steps:
            - uses: actions/checkout@v4
            - name: Run tfsec
              uses: aquasecurity/tfsec-action@v1.0.3
              with:
                  working_directory: infra/tofu
                  soft_fail: false

    trivy-fs:
        name: trivy fs scan
        runs-on: ubuntu-latest
        # Go dependency vulns are gated by govulncheck above; trivy here
        # focuses on secrets + IaC misconfig that govulncheck does not see.
        # Baseline lives in .trivyignore. Regressions fail the build.
        steps:
            - uses: actions/checkout@v4
            - name: Run Trivy filesystem scan
              uses: aquasecurity/trivy-action@0.24.0
              with:
                  scan-type: fs
                  scan-ref: .
                  scanners: secret,misconfig
                  severity: CRITICAL,HIGH
                  exit-code: "1"
                  ignore-unfixed: true
                  trivyignores: .trivyignore
                  skip-dirs: tmp,assets,node_modules,.git
